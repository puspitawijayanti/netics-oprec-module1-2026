- name: setup nginx reverse proxy 
  hosts: vps
  become: true

  tasks:
    - name: install nginx
      apt:
        name: nginx
        state: present
        update_cache: true

    - name: copy nginx reverse proxy config
      template:
        src: nginx.conf.j2
        dest: /etc/nginx/sites-available/health-api

    - name: enable site
      file:
        src: /etc/nginx/sites-available/health-api
        dest: /etc/nginx/sites-enabled/health-api
        state: link
        force: true

    - name: restart nginx
      service:
        name: nginx
        state: restarted
        enabled: true